services:
  - type: web
    name: nexus-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: nexus-server
          property: host
    plan: free

  - type: static
    name: nexus-client
    rootDir: client
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nexus-server
          property: host
    plan: free
